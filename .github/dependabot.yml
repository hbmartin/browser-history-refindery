version: 2
updates:
  - package-ecosystem: uv
    directory: /
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 10
    assignees:
      - hbmartin
    labels:
      - dependencies
      - python
    commit-message:
      prefix: deps
    groups:
      production-dependencies:
        dependency-type: production
      development-dependencies:
        dependency-type: development

  - package-ecosystem: github-actions
    directory: /
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 10
    assignees:
      - hbmartin
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: deps
    groups:
      github-actions:
        patterns:
          - "*"
