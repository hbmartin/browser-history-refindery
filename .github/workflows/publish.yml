name: Publish to PyPI

on:
  release:
    types:
      - published

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build release distributions
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
    steps:
      - name: Check out the release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install uv and Python 3.13
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false
          python-version: "3.13"
      - name: Verify the release target and versions
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
          uv run --no-project --python 3.13 python <<'PY'
          import os
          import re
          import tomllib
          from pathlib import Path

          release_tag = os.environ["RELEASE_TAG"]
          if re.fullmatch(r"v\d+\.\d+\.\d+", release_tag) is None:
              raise SystemExit(f"Release tag must be vX.Y.Z, got {release_tag!r}")

          pyproject = tomllib.loads(Path("pyproject.toml").read_text())
          project_version = pyproject["project"]["version"]
          version_source = Path(
              "src/browser_history_refindery/__init__.py"
          ).read_text()
          version_match = re.search(
              r'^__version__ = "([^"]+)"$',
              version_source,
              flags=re.MULTILINE,
          )
          if version_match is None:
              raise SystemExit("Could not find browser_history_refindery.__version__")

          runtime_version = version_match.group(1)
          expected_tag = f"v{project_version}"
          if release_tag != expected_tag or runtime_version != project_version:
              raise SystemExit(
                  f"Version mismatch: tag={release_tag}, "
                  f"project={project_version}, runtime={runtime_version}"
              )
          PY
      - name: Build distributions
        run: uv build
      - name: Upload distributions
        id: upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          if-no-files-found: error
          name: python-package-distributions
          path: dist/
          retention-days: 1

  publish:
    name: Publish distributions
    needs:
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/browser-history-refindery
    permissions:
      id-token: write # Required for PyPI trusted publishing and attestations.
    steps:
      - name: Download distributions from the build job
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          artifact-ids: ${{ needs.build.outputs.artifact-id }}
          path: dist/
      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/
          verify-metadata: true
