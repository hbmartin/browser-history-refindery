name: Lint and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv and Python 3.13
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          python-version: "3.13"
      - name: Install locked development dependencies
        run: uv sync --group dev --locked
      - name: Run Ruff lint
        run: uv run --no-sync ruff check .
      - name: Check Ruff formatting
        run: uv run --no-sync ruff format --check .
      - name: Run ty
        run: uv run --no-sync ty check
      - name: Run Pyrefly
        run: uv run --no-sync pyrefly check
      - name: Run complexity checks
        run: uv run --no-sync lizard --languages python src tests
      - name: Check dependency declarations
        run: uv run --no-sync deptry .
      - name: Check package metadata
        run: uv run --no-sync pyroma --min 10 .

  tests:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.13"
          - "3.14"
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv and Python ${{ matrix.python-version }}
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          cache-suffix: py${{ matrix.python-version }}
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Install locked development dependencies
        run: uv sync --group dev --locked
      - name: Run tests with coverage
        run: >-
          uv run --no-sync pytest
          --cov=browser_history_refindery
          --cov-report=term-missing
          --cov-report=xml
      - name: Upload coverage to Codecov
        if: >-
          matrix.python-version == '3.13' &&
          (github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.fork == false)
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          fail_ci_if_error: true
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  package:
    name: Package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv and Python 3.13
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          python-version: "3.13"
      - name: Build distributions
        run: uv build
      - name: Install the wheel in a clean environment
        run: |
          uv venv --python 3.13 .package-smoke
          uv pip install --python .package-smoke/bin/python dist/*.whl
      - name: Smoke-test the installed CLI
        run: .package-smoke/bin/refindery-import --version
